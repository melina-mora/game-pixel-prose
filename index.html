<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel &amp; Prose</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0D0C0A;
      --text: #F5F0E8;
      --mist: #8C8679;
      --ember: #C8692A;
      --gold: #A8924A;
      --line: rgba(140, 134, 121, 0.35);
      --log-font: 0.96rem;
      --choice-font: 0.66rem;
      --input-bg: rgba(13, 12, 10, 0.35);
      --ascii-0: #181715;
      --ascii-1: #2A2825;
      --ascii-2: #3E3A34;
      --ascii-3: #5E5951;
      --ascii-4: #8C8679;
      --ascii-5: #B9B2A7;
      --ascii-6: #F5F0E8;
    }

    body.theme-light {
      --bg: #F5F0E8;
      --text: #1A1815;
      --mist: #6F6556;
      --line: rgba(111, 101, 86, 0.35);
      --input-bg: rgba(245, 240, 232, 0.65);
      --ascii-0: #F5F0E8;
      --ascii-1: #DDD6CA;
      --ascii-2: #BDB5A6;
      --ascii-3: #8D8373;
      --ascii-4: #665D4F;
      --ascii-5: #403A31;
      --ascii-6: #1A1815;
    }

    .text-size-small {
      --log-font: 0.88rem;
      --choice-font: 0.62rem;
    }

    .text-size-medium {
      --log-font: 0.96rem;
      --choice-font: 0.66rem;
    }

    .text-size-large {
      --log-font: 1.04rem;
      --choice-font: 0.72rem;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Crimson Pro", serif;
      font-weight: 300;
    }

    #app {
      width: 100%;
      height: 100%;
      max-width: 980px;
      margin: 0 auto;
      padding: 12px 16px 16px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }

    #header {
      display: grid;
      gap: 8px;
      justify-items: center;
      text-align: center;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    .brand {
      font-family: "Cinzel", serif;
      font-size: 1.08rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .hud {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.58rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--mist);
    }

    .hud strong {
      color: var(--text);
      font-weight: 600;
      margin-left: 4px;
    }

    .group {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .label {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.56rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mist);
      margin-right: 2px;
    }

    .api-status,
    input,
    button {
      border: 1px solid var(--line);
      background: var(--input-bg);
      color: var(--text);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.6rem;
      padding: 5px 7px;
      transition: border-color 150ms ease, color 150ms ease;
    }

    input {
      width: 170px;
    }

    button {
      cursor: pointer;
    }

    button:hover:not(:disabled),
    .text-size-btn.active {
      border-color: rgba(200, 105, 42, 0.72);
      color: var(--ember);
    }

    .theme-btn.active {
      border-color: rgba(168, 146, 74, 0.8);
      color: var(--gold);
    }

    #ascii-wrap {
      display: grid;
      justify-items: center;
      align-items: start;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }

    #scene-art {
      width: 400px;
      height: 400px;
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      color: var(--text);
      font-family: "JetBrains Mono", monospace;
      font-size: 8px;
      line-height: 8px;
      letter-spacing: 0.08px;
      white-space: pre;
      overflow: hidden;
      opacity: 1;
      transition: opacity 200ms ease;
      text-align: left;
    }

    #scene-art.fade {
      opacity: 0.42;
    }

    #scene-art .a0 { color: var(--ascii-0); }
    #scene-art .a1 { color: var(--ascii-1); }
    #scene-art .a2 { color: var(--ascii-2); }
    #scene-art .a3 { color: var(--ascii-3); }
    #scene-art .a4 { color: var(--ascii-4); }
    #scene-art .a5 { color: var(--ascii-5); }
    #scene-art .a6 { color: var(--ascii-6); }

    #location-title {
      width: 400px;
      margin-top: 8px;
      font-family: "Cinzel", serif;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ember);
      text-align: left;
    }

    #log {
      width: min(880px, 100%);
      margin: 0 auto;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
      display: grid;
      gap: 10px;
      align-content: start;
      min-height: 0;
      padding: 4px 2px;
    }

    #log p {
      line-height: 1.64;
      font-size: var(--log-font);
      animation: riseIn 210ms ease-out;
      text-align: left;
    }

    #log p.system {
      font-family: "JetBrains Mono", monospace;
      font-size: calc(var(--log-font) - 0.26rem);
      letter-spacing: 0.03em;
      color: var(--mist);
      text-transform: uppercase;
    }

    #log p.accent {
      color: var(--gold);
    }

    #log p.danger {
      color: var(--ember);
      font-style: italic;
    }

    #choices {
      width: min(880px, 100%);
      margin: 0 auto;
      border-top: 1px solid var(--line);
      padding-top: 10px;
      display: grid;
      gap: 7px;
      max-height: 230px;
      overflow-y: auto;
    }

    .choice {
      text-align: left;
      letter-spacing: 0.02em;
      padding: 8px 10px;
      font-size: var(--choice-font);
      border: 1px solid var(--line);
      background: var(--input-bg);
      color: var(--text);
      font-family: "JetBrains Mono", monospace;
      transition: border-color 150ms ease, color 150ms ease, transform 150ms ease;
      cursor: pointer;
    }

    .choice::before {
      content: "> ";
      color: var(--ember);
    }

    .choice:hover:not(:disabled) {
      border-color: rgba(200, 105, 42, 0.72);
      color: var(--ember);
      transform: translateY(-1px);
    }

    .choice:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .pulse-danger {
      animation: pulseDanger 1.3s infinite;
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulseDanger {
      0%, 100% { box-shadow: inset 0 0 0 0 rgba(200, 105, 42, 0.08); }
      50% { box-shadow: inset 0 0 0 2px rgba(200, 105, 42, 0.28); }
    }

    @media (max-width: 880px) {
      #app {
        padding: 10px;
      }

      input {
        width: 130px;
      }

      #scene-art,
      #location-title {
        width: 300px;
      }

      #scene-art {
        height: 300px;
        font-size: 6px;
        line-height: 6px;
        letter-spacing: 0.06px;
      }
    }
  </style>
</head>
<body class="text-size-medium theme-dark">
  <main id="app">
    <header id="header">
      <div class="brand">Pixel &amp; Prose</div>

      <div class="toolbar">
        <div class="group">
          <span class="label">Text</span>
          <button type="button" class="text-size-btn" data-size="small">S</button>
          <button type="button" class="text-size-btn active" data-size="medium">M</button>
          <button type="button" class="text-size-btn" data-size="large">L</button>
        </div>

        <div class="group">
          <span class="label">Theme</span>
          <button type="button" class="theme-btn active" data-theme="dark">Dark</button>
          <button type="button" class="theme-btn" data-theme="light">Light</button>
        </div>

        <div class="group">
          <span id="api-status" class="api-status">AI Offline</span>
          <input id="api-key" type="password" placeholder="OpenAI key (optional)" autocomplete="off" />
          <button id="api-connect" type="button">Connect</button>
          <button id="restart" type="button">Restart</button>
        </div>
      </div>

      <div class="hud">
        <span>HP<strong id="stat-hp">24 / 24</strong></span>
        <span>Torches<strong id="stat-torches">5</strong></span>
        <span>ATK/DEF<strong id="stat-atkdef">5 / 2</strong></span>
        <span>Zones<strong id="stat-location">1 / 5</strong></span>
        <span>Inventory<strong id="stat-inventory">none</strong></span>
      </div>
    </header>

    <section id="ascii-wrap">
      <pre id="scene-art" aria-label="Current scene" role="img"></pre>
      <div id="location-title">Ruined Gate</div>
    </section>

    <section id="log" aria-live="polite"></section>
    <section id="choices" aria-label="Available choices"></section>
  </main>

  <script type="module" src="./game.js"></script>
</body>
</html>
