<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emberward: Pixel Prose RPG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* Design tokens are centralized so JS scene rendering and UI styling stay visually aligned. */
    :root {
      --bg: #0D0C0A;
      --text: #F5F0E8;
      --panel: #2A2825;
      --ember: #C8692A;
      --gold: #A8924A;
      --mist: #8C8679;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 78% 12%, rgba(200, 105, 42, 0.11), transparent 34%),
        linear-gradient(180deg, rgba(42, 40, 37, 0.65) 0%, var(--bg) 52%);
      color: var(--text);
      font-family: "Crimson Pro", serif;
      font-weight: 300;
    }

    /* Two-panel shell keeps art/stats persistent while narrative + choices change frequently. */
    .shell {
      max-width: 1120px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 16px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 14px;
    }

    .left,
    /* Right panel is split into stable controls, streaming narrative log, then actions. */
    .right {
      background: linear-gradient(180deg, rgba(42, 40, 37, 0.9) 0%, var(--panel) 100%);
      border: 1px solid rgba(140, 134, 121, 0.35);
      box-shadow: 0 0 0 1px rgba(13, 12, 10, 0.6) inset;
    }

    .left {
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 12px;
      padding: 14px;
    }

    .title {
      border-bottom: 1px solid rgba(168, 146, 74, 0.55);
      padding-bottom: 10px;
    }

    .title h1 {
      font-family: "Cinzel", serif;
      font-size: 1.12rem;
      letter-spacing: 0.18em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .title p {
      margin-top: 4px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.62rem;
      color: var(--mist);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .scene-frame {
      background: var(--bg);
      border: 1px solid rgba(140, 134, 121, 0.4);
      padding: 8px;
    }

    #scene-canvas {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: var(--bg);
      transition: opacity 220ms ease;
    }

    #scene-canvas.fade {
      opacity: 0.35;
    }

    .location-title {
      margin-top: 8px;
      font-family: "Cinzel", serif;
      font-size: 0.74rem;
      letter-spacing: 0.14em;
      color: var(--ember);
      text-transform: uppercase;
    }

    .meta {
      display: grid;
      gap: 7px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.68rem;
      color: var(--mist);
      text-transform: uppercase;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }

    .stat-row strong {
      color: var(--text);
      font-weight: 600;
    }

    .bar {
      width: 100%;
      height: 6px;
      background: rgba(13, 12, 10, 0.8);
      border: 1px solid rgba(140, 134, 121, 0.38);
      margin-top: 5px;
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--ember), var(--gold));
      transition: width 220ms ease;
    }

    .inventory {
      border-top: 1px solid rgba(140, 134, 121, 0.28);
      padding-top: 8px;
      min-height: 70px;
    }

    .inventory h2 {
      font-family: "JetBrains Mono", monospace;
      color: var(--mist);
      font-size: 0.62rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    #inventory-list {
      display: grid;
      gap: 4px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.66rem;
      color: var(--gold);
    }

    .right {
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(140, 134, 121, 0.28);
      padding: 12px;
    }

    .api-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
    }

    .tag {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mist);
    }

    .api-status {
      padding: 4px 6px;
      border: 1px solid rgba(140, 134, 121, 0.42);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.58rem;
      text-transform: uppercase;
      color: var(--mist);
      letter-spacing: 0.08em;
    }

    .api-status.live {
      color: var(--gold);
      border-color: rgba(168, 146, 74, 0.64);
    }

    input,
    button {
      border: 1px solid rgba(140, 134, 121, 0.42);
      background: var(--bg);
      color: var(--text);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.62rem;
      padding: 6px 8px;
    }

    input {
      width: 180px;
    }

    button {
      cursor: pointer;
      transition: border-color 160ms ease, color 160ms ease;
    }

    button:hover:not(:disabled) {
      border-color: var(--ember);
      color: var(--ember);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #log {
      overflow-y: auto;
      padding: 14px;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    #log p {
      line-height: 1.7;
      font-size: 0.98rem;
      animation: appear 180ms ease-out;
    }

    #log p.system {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.68rem;
      letter-spacing: 0.03em;
      color: var(--mist);
    }

    #log p.accent {
      color: var(--gold);
    }

    #log p.danger {
      color: var(--ember);
      font-style: italic;
    }

    #choices {
      border-top: 1px solid rgba(140, 134, 121, 0.28);
      padding: 10px 12px 14px;
      display: grid;
      gap: 8px;
      background:
        linear-gradient(180deg, rgba(13, 12, 10, 0.35) 0%, rgba(13, 12, 10, 0.62) 100%);
    }

    .choice {
      text-align: left;
      letter-spacing: 0.02em;
      padding: 8px 10px;
      font-size: 0.67rem;
    }

    .choice::before {
      content: "> ";
      color: var(--ember);
    }

    .pulse-danger {
      animation: pulseDanger 1.4s infinite;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(3px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulseDanger {
      0%, 100% { box-shadow: inset 0 0 0 0 rgba(200, 105, 42, 0.08); }
      50% { box-shadow: inset 0 0 0 2px rgba(200, 105, 42, 0.3); }
    }

    @media (max-width: 980px) {
      .shell {
        grid-template-columns: 1fr;
      }

      input {
        width: 140px;
      }
    }
  </style>
</head>
<body>
  <!-- Static HTML skeleton; game flow and scene switching are controlled by game.js state transitions. -->
  <div class="shell">
    <aside class="left">
      <section class="title">
        <h1>Emberward</h1>
        <p>Pixel Prose RPG</p>
      </section>

      <section class="scene-frame">
        <canvas id="scene-canvas" width="160" height="120" aria-label="Current scene" role="img"></canvas>
        <div id="location-title" class="location-title">Ruined Gate</div>
      </section>

      <section class="meta">
        <div class="stat-row"><span>HP</span><strong id="stat-hp">24 / 24</strong></div>
        <div class="bar" aria-hidden="true"><span id="hp-bar"></span></div>
        <div class="stat-row"><span>Atk / Def</span><strong id="stat-atkdef">5 / 2</strong></div>
        <div class="stat-row"><span>Location</span><strong id="stat-location">1 / 5</strong></div>
      </section>

      <section class="inventory">
        <h2>Inventory</h2>
        <div id="inventory-list"></div>
      </section>
    </aside>

    <main class="right">
      <header class="topbar">
        <span class="tag">Explore -> Encounter -> Choose -> Consequence</span>
        <div class="api-group">
          <span id="api-status" class="api-status">AI Offline</span>
          <input id="api-key" type="password" placeholder="OpenAI key (optional)" autocomplete="off" />
          <button id="api-connect" type="button">Connect</button>
          <button id="restart" type="button">Restart</button>
        </div>
      </header>

      <section id="log" aria-live="polite"></section>
      <section id="choices" aria-label="Available choices"></section>
    </main>
  </div>

  <script type="module" src="./game.js"></script>
</body>
</html>
